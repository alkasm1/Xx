<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الترددي اللغوي</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h2 {
      color: #79c0ff;
      margin-bottom: 10px;
    }

    label {
      margin-top: 10px;
      display: block;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 1rem;
      height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2ea043;
    }

    .copy-btn {
      background: #4ade80;
      color: #0d1117;
    }

    .copy-btn:hover {
      background: #22c55e;
    }

    .output {
      margin-top: 10px;
      padding: 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #6e7681;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>النظام الترددي اللغوي</h1>

    <div class="row">

      <div class="card">
        <h2>تحويل جملة إلى ترددات</h2>
        <label>أدخل نصًا عربيًا (يمكن أن يكون مقالة كاملة):</label>
        <textarea id="sentenceInput" placeholder="ألصق هنا أي نص طويل..."></textarea>
        <button onclick="encodeSentence()">تحويل</button>
        <button class="copy-btn" onclick="copyAllFreqs()">نسخ جميع الترددات</button>
        <div class="output" id="encodeOutput">—</div>
      </div>

      <div class="card">
        <h2>تحويل ترددات إلى جملة</h2>
        <label>أدخل الترددات (كل تردد في سطر):</label>
        <textarea id="freqListInput"></textarea>
        <button onclick="decodeFreqList()">تحويل</button>
        <div class="output" id="decodeOutput">—</div>
      </div>

    </div>

    <div class="footer">
      م: رأفت عمر — تعديل LMAX=12 بواسطة برهوم
    </div>

  </div>

<script>
  const B = 32;
  const LMAX = 12;

  let f0 = 100000;
  let df = 1;

  const indexToChar = {
    0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    if (ch) charToIndex[ch] = parseInt(i);
  }

  function splitWord(word) {
    const blocks = [];
    for (let i = 0; i < word.length; i += LMAX) {
      blocks.push(word.slice(i, i + LMAX));
    }
    return blocks;
  }

  function wordToCode(word){
    const c = new Array(LMAX).fill(0);
    let pos = 0;
    for (let i = word.length - 1; i >= 0; i--){
      const idx = charToIndex[word[i]];
      if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
      c[pos++] = idx;
    }
    let C = 0n;
    for (let i = 0; i < LMAX; i++){
      C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
    }
    return C;
  }

  function codeToWord(Cbig){
    let C = BigInt(Cbig);
    const digits = [];
    for (let i = 0; i < LMAX; i++){
      digits.push(Number(C % BigInt(B)));
      C /= BigInt(B);
    }
    let w = "";
    for (let i = LMAX - 1; i >= 0; i--){
      w += indexToChar[digits[i]] || "";
    }
    return w;
  }

  function encodeSentence(){
    const sentence = document.getElementById("sentenceInput").value.trim();
    const words = sentence.split(/\s+/);
    let allFreqs = [];

    let totalBlocks = 0;

    words.forEach(word => {
      const blocks = splitWord(word);
      totalBlocks += blocks.length;

      blocks.forEach(block => {
        const C = wordToCode(block);
        const f = f0 + Number(C) * df;
        allFreqs.push(f);
      });
    });

    let html = `
      <p>عدد الكلمات: ${words.length}</p>
      <p>عدد البلوكات: ${totalBlocks}</p>
      <p>عدد الترددات الناتجة: ${allFreqs.length}</p>
      <textarea style="width:100%;height:250px;background:#0d1117;color:white;border:1px solid #30363d;border-radius:8px;">${allFreqs.join("\n")}</textarea>
    `;

    document.getElementById("encodeOutput").innerHTML = html;

    window.lastFreqList = allFreqs;
  }

  function copyAllFreqs(){
    if (!window.lastFreqList) return;
    navigator.clipboard.writeText(window.lastFreqList.join("\n"));
  }

  function decodeFreqList(){
    const input = document.getElementById("freqListInput").value.trim();
    const lines = input.split(/\n+/);
    const words = [];

    lines.forEach(line => {
      const freq = Number(line.trim());
      if (isNaN(freq)) return;

      const C = Math.round((freq - f0) / df);
      const block = codeToWord(BigInt(C));
      words.push(block);
    });

    document.getElementById("decodeOutput").textContent = words.join(" ");
  }
</script>

</body>
</html>
