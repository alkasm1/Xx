<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>النظام الترددي اللغوي — 
  م : رأفت عمر</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #161b22;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid #30363d;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    h2 {
      color: #79c0ff;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 1rem;
      height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #2ea043; }

    .copy-btn {
      background: #4ade80;
      color: #0d1117;
    }

    .output {
      margin-top: 10px;
      padding: 12px;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 860px) { .row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>

<body>

  <div class="container">
    <h1>النظام الترددي اللغوي — 
    م : رأفت عمر</h1>

    <div class="row">

      <div>
        <h2>تحويل جملة إلى ترددات</h2>
        <textarea id="sentenceInput" placeholder="أدخل نصًا عربيًا..."></textarea>
        <button onclick="encodeSentence()">تحويل</button>
        <button class="copy-btn" onclick="copyAllFreqs()">نسخ الترددات</button>
        <div class="output" id="encodeOutput">—</div>
      </div>

      <div>
        <h2>تحويل ترددات إلى جملة</h2>
        <textarea id="freqListInput" placeholder="أدخل الترددات..."></textarea>
        <button onclick="decodeFreqList()">تحويل</button>
        <div class="output" id="decodeOutput">—</div>
      </div>

    </div>
  </div>

<script>
  // إعدادات النظام
  const B = 32;
  const LMAX = 12;   // دعم كلمات طويلة جدًا
  const f0 = 100000;
  const df = 1;

  // التطبيع العربي
  function normalizeArabic(s) {
    return (s || "")
      .replace(/[إأآ]/g, "ا")
      .replace(/ى/g, "ي")
      .replace(/ؤ/g, "و")
      .replace(/ئ/g, "ي")
      .replace(/ة/g, "ه");
  }

  // جدول الحروف
  const indexToChar = {
    0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
    8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
    15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
    22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
  };

  const charToIndex = {};
  for (const [i,ch] of Object.entries(indexToChar)) {
    if (ch) charToIndex[ch] = parseInt(i);
  }

  // تقسيم الكلمة إلى بلوكات
  function splitWord(word) {
    const blocks = [];
    for (let i = 0; i < word.length; i += LMAX) {
      blocks.push(word.slice(i, i + LMAX));
    }
    return blocks;
  }

  // تحويل بلوك إلى رقم
  function wordToCode(word){
    const c = new Array(LMAX).fill(0);
    let pos = 0;
    for (let i = word.length - 1; i >= 0; i--){
      const idx = charToIndex[word[i]];
      if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
      c[pos++] = idx;
    }
    let C = 0n;
    for (let i = 0; i < LMAX; i++){
      C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
    }
    return C;
  }

  // تحويل رقم إلى بلوك
  function codeToWord(Cbig){
    let C = BigInt(Cbig);
    const digits = [];
    for (let i = 0; i < LMAX; i++){
      digits.push(Number(C % BigInt(B)));
      C /= BigInt(B);
    }
    let w = "";
    for (let i = LMAX - 1; i >= 0; i--){
      w += indexToChar[digits[i]] || "";
    }
    return w;
  }

  // ترميز جملة
  function encodeSentence(){
    const sentence = normalizeArabic(
      document.getElementById("sentenceInput").value.trim()
    );

    const words = sentence.split(/\s+/);
    let allFreqs = [];

    words.forEach(word => {
      const blocks = splitWord(word);
      blocks.forEach(block => {
        const C = wordToCode(block);
        const f = f0 + Number(C) * df;
        allFreqs.push(f);
      });
    });

    document.getElementById("encodeOutput").textContent =
      allFreqs.join("\n");

    window.lastFreqList = allFreqs;
  }

  // نسخ الترددات
  function copyAllFreqs(){
    if (!window.lastFreqList) return;

    const text = window.lastFreqList.join("\n");

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }

  // فك الترددات
  function decodeFreqList(){
    const input = document.getElementById("freqListInput").value.trim();
    const lines = input.split(/\n+/);

    const words = [];

    lines.forEach(line => {
      const freq = Number(line.trim());
      if (isNaN(freq)) return;

      const C = Math.round((freq - f0) / df);
      const block = codeToWord(BigInt(C));
      words.push(block);
    });

    document.getElementById("decodeOutput").textContent =
      words.join(" ");
  }
</script>

</body>
</html>
